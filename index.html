<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ao Vivo - IPDA Setorial Contagem Centro</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

header{
    background:#0d47a1;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    max-width:700px;
    margin:20px auto;
    padding:15px;
}

.cartaz{
    position:relative;
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 2px 10px rgba(0,0,0,.2);
}

.cartaz img{
    width:100%;
    display:block;
}

.aovivo{
    position:absolute;
    top:15px;
    right:15px;
    background:red;
    color:white;
    padding:8px 15px;
    border-radius:20px;
    font-weight:bold;
}

button{
    width:100%;
    padding:15px;
    border:none;
    background:#0d47a1;
    color:white;
    font-size:18px;
    cursor:pointer;
}

#mensagem{
    text-align:center;
    margin-top:20px;
}
</style>
</head>

<body>

<header>
    <h1>IPDA Setorial Contagem Centro</h1>
    <h3>Transmissão ao Vivo</h3>
</header>

<div class="container">

    <div id="culto"></div>

    <div id="mensagem">
        Carregando transmissão...
    </div>

</div>

</html>
