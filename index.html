const firebaseConfig = {

const db = firebase.database();

const pedidoInput = document.getElementById("pedido");
const contador = document.getElementById("contador");

pedidoInput.addEventListener("input", () => {
    contador.innerText =
        pedidoInput.value.length + "/100";
});

db.ref("aovivo/transmissao")
.on("value",(snapshot)=>{

    let culto = snapshot.val();

    if(!culto){

        document.getElementById("mensagem")
        .innerHTML = "Nenhuma transmissão cadastrada.";

        return;
    }

    if(!culto.ativo){

        document.getElementById("culto").innerHTML = "";

        document.getElementById("mensagem")
        .innerHTML = "Nenhuma transmissão no momento.";

        return;
    }

    document.getElementById("mensagem").innerHTML = "";

    document.getElementById("culto")
    .innerHTML = `

        <div class="cartaz">

            <img src="${culto.cartaz}">

            <div class="aovivo">
                🔴 AO VIVO
            </div>

        </div>

        <h2 style="text-align:center;">
            ${culto.titulo}
        </h2>
<button
onclick="ouvirCulto('${culto.youtube}')">

    ▶ OUVIR AGORA

</button>

<div id="player-live"></div>

`;

});


function enviarPedido(){

    if(localStorage.getItem("pedidoEnviado")){
        alert("Este navegador já enviou um pedido.");
        return;
    }

    const nome =
    document.getElementById("nome").value.trim();

    const pedido =
    document.getElementById("pedido").value.trim();

    if(nome === "" || pedido === ""){
        alert("Preencha todos os campos.");
        return;
    }

    if(pedido.length > 100){
        alert("O pedido deve ter no máximo 100 caracteres.");
        return;
    }

    db.ref("pedidosOracao")
    .push({
        nome:nome,
        pedido:pedido,
        data:new Date().toISOString()
    })

    .then(()=>{

        localStorage.setItem(
            "pedidoEnviado",
            "sim"
        );

        alert("Pedido enviado com sucesso.");

        document.getElementById("nome").value = "";
        document.getElementById("pedido").value = "";

    })

    .catch((erro)=>{

        console.error("Erro Firebase:", erro);

        alert(
            "Erro ao enviar pedido:\n\n" +
            erro.message
        );

    });

}

function ouvirCulto(link){

    let videoId = "";

    if(link.includes("watch?v=")){
        videoId = link.split("watch?v=")[1].split("&")[0];
    }
    else if(link.includes("youtu.be/")){
        videoId = link.split("youtu.be/")[1].split("?")[0];
    }
    else if(link.includes("/live/")){
        videoId = link.split("/live/")[1].split("?")[0];
    }

    if(!videoId){
        alert("Link do YouTube inválido.");
        return;
    }

    document.getElementById("player-live").innerHTML = `
        <div style="
            margin-top:20px;
            position:relative;
            padding-bottom:56.25%;
            height:0;
            overflow:hidden;
            border-radius:15px;
            box-shadow:0 2px 10px rgba(0,0,0,.2);
        ">
            <iframe
                src="https://www.youtube.com/embed/${videoId}?autoplay=1"
                frameborder="0"
                allow="autoplay; encrypted-media"
                allowfullscreen
                style="
                    position:absolute;
                    top:0;
                    left:0;
                    width:100%;
                    height:100%;
                ">
            </iframe>
        </div>
    `;
}

const imagens = [
    "01.jpg",
    "02.jpg",
    "03.jpg",
    "04.jpg",
    "05.jpg",
    "06.jpg"
];

let slideAtual = 0;

function trocarSlide(){

    const slide =
    document.getElementById("slide");

    slide.style.opacity = "0";

    setTimeout(() => {

        slideAtual++;

        if(slideAtual >= imagens.length){
            slideAtual = 0;
        }

        slide.src = imagens[slideAtual];

        document
        .querySelectorAll(".dot")
        .forEach(dot =>
            dot.classList.remove("ativo")
        );

        document
        .querySelectorAll(".dot")[slideAtual]
        .classList.add("ativo");

        slide.style.opacity = "1";

    }, 300);

}

setInterval(trocarSlide, 5000);

function carregarVersiculoDoDia(){

    const hoje = new Date();

    const inicioAno =
        new Date(hoje.getFullYear(),0,1);

    const diaDoAno =
        Math.floor(
            (hoje - inicioAno) /
            86400000
        );

    const indice =
        diaDoAno % versiculos.length;

    document.getElementById(
        "texto-versiculo"
    ).innerText =
        '"' +
        versiculos[indice].texto +
        '"';

    document.getElementById(
        "referencia-versiculo"
    ).innerText =
        versiculos[indice].ref;
}

carregarVersiculoDoDia();
