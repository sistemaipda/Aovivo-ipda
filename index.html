<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ao Vivo - IPDA Setorial Contagem Centro</title><style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

header{
    background:#0d47a1;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    max-width:700px;
    margin:20px auto;
    padding:15px;
}

.cartaz{
    position:relative;
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 2px 10px rgba(0,0,0,.2);
}

.cartaz img{
    width:100%;
    display:block;
}

.aovivo{
    position:absolute;
    top:15px;
    right:15px;
    background:red;
    color:white;
    padding:8px 15px;
    border-radius:20px;
    font-weight:bold;
}

button{
    width:100%;
    padding:15px;
    border:none;
    background:#0d47a1;
    color:white;
    font-size:18px;
    cursor:pointer;
    border-radius:8px;
}

input,
textarea{
    width:100%;
    padding:10px;
    box-sizing:border-box;
    margin-bottom:10px;
    border:1px solid #ccc;
    border-radius:8px;
}

#mensagem{
    text-align:center;
    margin-top:20px;
}

#oracao{
    margin-top:30px;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

</style></head><body><header>
    <h1>IPDA Setorial Contagem Centro</h1>
    <h3>Transmissão ao Vivo</h3>
</header><div class="container"><div id="culto"></div>

<div id="mensagem">
    Carregando transmissão...
</div>

<div id="oracao">

    <h2>🙏 Pedido de Oração</h2>

    <input
    id="nome"
    placeholder="Seu nome">

    <textarea
    id="pedido"
    placeholder="Digite seu pedido"
    rows="5"></textarea>

    <button onclick="enviarPedido()">
        Enviar Pedido
    </button>

</div>

</div><script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script><script>

const firebaseConfig = {

  apiKey: "AIzaSyC5Ylv9RyBfZ3BN5IgDWGqrldQR9yIbFRA",

  authDomain: "ipda-setorial-contagem.firebaseapp.com",

  databaseURL:
  "https://ipda-setorial-contagem-default-rtdb.firebaseio.com",

  projectId: "ipda-setorial-contagem",

  storageBucket:
  "ipda-setorial-contagem.appspot.com",

  messagingSenderId:
  "815344482867",

  appId:
  "1:815344482867:web:221f5624f89c1e25468146"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

db.ref("aovivo/transmissao")
.on("value",(snapshot)=>{

    let culto = snapshot.val();

    if(!culto){

        document.getElementById("mensagem")
        .innerHTML = "Nenhuma transmissão cadastrada.";

        return;
    }

    if(!culto.ativo){

        document.getElementById("culto").innerHTML = "";

        document.getElementById("mensagem")
        .innerHTML = "Nenhuma transmissão no momento.";

        return;
    }

    document.getElementById("mensagem").innerHTML = "";

    document.getElementById("culto")
    .innerHTML = `

        <div class="cartaz">

            <img src="${culto.cartaz}">

            <div class="aovivo">
                🔴 AO VIVO
            </div>

        </div>

        <h2 style="text-align:center;">
            ${culto.titulo}
        </h2>

        <button
        onclick="ouvirCulto('${culto.youtube}')">

            ▶ OUVIR AGORA

        </button>

    `;

});

function ouvirCulto(link){

    window.open(link, "_blank");

}

function enviarPedido(){

    const nome =
    document.getElementById("nome").value.trim();

    const pedido =
    document.getElementById("pedido").value.trim();

    if(nome === "" || pedido === ""){

        alert("Preencha todos os campos.");

        return;
    }

    db.ref("pedidosOracao")
.push({

    nome:nome,
    pedido:pedido,
    data:new Date().toISOString()

})

.then(()=>{

    alert("Pedido enviado com sucesso.");

    document.getElementById("nome").value = "";
    document.getElementById("pedido").value = "";

})

.catch((erro)=>{

    console.error("Erro Firebase:", erro);

    alert("Erro ao enviar pedido.");

});

}
</script>

</body>
</html>
