footer{

    background:#0d47a1;

    text-align:center;
    padding:30px 20px;

    margin-top:0;

    margin:8px 0;

.cartaz{
    position:relative;
    background:white;

    overflow:hidden;

#contador{

    color:#666;
    font-size:14px;
    margin-top:-5px;

.aovivo{
    position:absolute;

        135deg,

    transform:translateY(-2px);
}

textarea{
    width:100%;

    border:1px solid #ccc;

}

#mensagem{
    text-align:center;
    margin-top:20px;
}

#oracao{
    margin-top:30px;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

header{
    background:linear-gradient(135deg,#0d47a1,#1565c0);
    color:white;
    padding:20px;
    text-align:center;
    box-shadow:0 3px 10px rgba(0,0,0,.2);
}

.logo-area{
    background:white;
    border-radius:15px;
    padding:10px;
    margin-bottom:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.2);
}

#logo-igreja{
    width:100%;
    max-width:700px;
    height:auto;
    display:block;

</style></head><body><header>

    <div class="logo-area">
        <img
        src="logo.png"
        alt="Logo Igreja"
        id="logo-igreja">
    </div>

    <h3>Transmissão Ao Vivo</h3>

</header><div class="container"><div id="culto"></div>

<div id="mensagem">
    Carregando transmissão...
</div>

<div id="oracao">

    <h2>🙏 Pedido de Oração</h2>

    <input
    id="nome"
    placeholder="Seu nome">

    <textarea
id="pedido"
placeholder="Digite seu pedido"
rows="5"
maxlength="100"></textarea>

<div id="contador">0/100</div>

    <button onclick="enviarPedido()">
        Enviar Pedido
    </button>

</div>

</div><script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script><script>

const firebaseConfig = {

  apiKey: "AIzaSyC5Ylv9RyBfZ3BN5IgDWGqrldQR9yIbFRA",

  authDomain: "ipda-setorial-contagem.firebaseapp.com",

  databaseURL:
  "https://ipda-setorial-contagem-default-rtdb.firebaseio.com",

  projectId: "ipda-setorial-contagem",

  storageBucket:
  "ipda-setorial-contagem.appspot.com",

  messagingSenderId:
  "815344482867",

  appId:
  "1:815344482867:web:221f5624f89c1e25468146"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

const pedidoInput = document.getElementById("pedido");
const contador = document.getElementById("contador");

pedidoInput.addEventListener("input", () => {
    contador.innerText =
        pedidoInput.value.length + "/100";
});

db.ref("aovivo/transmissao")
.on("value",(snapshot)=>{

    let culto = snapshot.val();

    if(!culto){

        document.getElementById("mensagem")
        .innerHTML = "Nenhuma transmissão cadastrada.";

        return;
    }

    if(!culto.ativo){

        document.getElementById("culto").innerHTML = "";

        document.getElementById("mensagem")
        .innerHTML = "Nenhuma transmissão no momento.";

        return;
    }

    document.getElementById("mensagem").innerHTML = "";

    document.getElementById("culto")
    .innerHTML = `

        <div class="cartaz">

            <img src="${culto.cartaz}">

            <div class="aovivo">
                🔴 AO VIVO
            </div>

        </div>

        <h2 style="text-align:center;">
            ${culto.titulo}
        </h2>
<button
onclick="ouvirCulto('${culto.youtube}')">

    ▶ OUVIR AGORA

</button>

<div id="player-live"></div>

`;

});


function enviarPedido(){

    if(localStorage.getItem("pedidoEnviado")){
        alert("Este navegador já enviou um pedido.");
        return;
    }

    const nome =
    document.getElementById("nome").value.trim();

    const pedido =
    document.getElementById("pedido").value.trim();

    if(nome === "" || pedido === ""){
        alert("Preencha todos os campos.");
        return;
    }

    if(pedido.length > 100){
        alert("O pedido deve ter no máximo 100 caracteres.");
        return;
    }

    db.ref("pedidosOracao")
    .push({
        nome:nome,
        pedido:pedido,
        data:new Date().toISOString()
    })

    .then(()=>{

        localStorage.setItem(
            "pedidoEnviado",
            "sim"
        );

        alert("Pedido enviado com sucesso.");

        document.getElementById("nome").value = "";
        document.getElementById("pedido").value = "";

    })

    .catch((erro)=>{

        console.error("Erro Firebase:", erro);

        alert(
            "Erro ao enviar pedido:\n\n" +
            erro.message
        );

    });

}

function ouvirCulto(link){

    let videoId = "";

    if(link.includes("watch?v=")){
        videoId = link.split("watch?v=")[1].split("&")[0];
    }
    else if(link.includes("youtu.be/")){
        videoId = link.split("youtu.be/")[1].split("?")[0];
    }
    else if(link.includes("/live/")){
        videoId = link.split("/live/")[1].split("?")[0];
    }

    if(!videoId){
        alert("Link do YouTube inválido.");
        return;
    }

    document.getElementById("player-live").innerHTML = `
        <div style="
            margin-top:20px;
            position:relative;
            padding-bottom:56.25%;
            height:0;
            overflow:hidden;
            border-radius:15px;
            box-shadow:0 2px 10px rgba(0,0,0,.2);
        ">
            <iframe
                src="https://www.youtube.com/embed/${videoId}?autoplay=1"
                frameborder="0"
                allow="autoplay; encrypted-media"
                allowfullscreen
                style="
                    position:absolute;
                    top:0;
                    left:0;
                    width:100%;
                    height:100%;
                ">
            </iframe>
        </div>
    `;
}

</script>
